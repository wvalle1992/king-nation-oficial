<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Autenticando...</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="min-h-screen bg-gray-50 flex items-center justify-center p-6">
  <div class="max-w-md w-full rounded-2xl border border-gray-200 bg-white p-6 shadow-sm text-center">
    <h1 class="text-lg font-semibold text-gray-800">Conectando con Discord...</h1>
    <p id="auth-status" class="mt-2 text-sm text-gray-500">Estamos completando tu inicio de sesión.</p>
  </div>

  <script>
    const SUPABASE_URL = 'https://vtyekyzpdnsnhpeiuite.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ0eWVreXpwZG5zbmhwZWl1aXRlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5NDM0NTMsImV4cCI6MjA5MTUxOTQ1M30.U1d2wPSj5co0RZre7GGM0jbko7BsMd-tTcMV-DjIS9g';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const authStatus = document.getElementById('auth-status');

    async function handleAuthCallback() {
      const code = new URLSearchParams(window.location.search).get('code');

      if (!code) {
        authStatus.textContent = 'No se encontro el codigo de autenticacion.';
        return;
      }

      const { error } = await supabaseClient.auth.exchangeCodeForSession(code);

      if (error) {
        console.error('Supabase OAuth callback error:', error);
        authStatus.textContent = 'No se pudo completar el inicio de sesion con Discord.';
        return;
      }

      window.location.href = '/';
    }

    handleAuthCallback();
  </script>
</body>
</html>
